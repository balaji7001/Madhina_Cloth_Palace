<h2>Manage Products</h2>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="category" placeholder="Category">

<input type="file" id="imageFile" onchange="previewImage()">
<img id="preview" width="100" style="display:none">

<button onclick="add()">Save</button>

<script src="script.js"></script>

<script>
    function previewImage() {
        let file = imageFile.files[0];
        let reader = new FileReader();
        reader.onload = e => {
            preview.src = e.target.result;
            preview.style.display = "block";
        };
        reader.readAsDataURL(file);
    }

    function add() {
        let file = imageFile.files[0];
        let editId = localStorage.getItem("editId");

        function save(img) {
            if (editId) {
                products = products.map(p => p.id == editId ? { ...p, name: name.value, price: price.value, category: category.value, img: img || p.img } : p);
                localStorage.removeItem("editId");
            } else {
                if (!name.value || !price.value || !category.value) {
                    alert("Fill all fields");
                    return;
                }
            }
            localStorage.setItem("products", JSON.stringify(products));
            alert("Saved");
            location.reload();
        }

        if (file) {
            let reader = new FileReader();
            reader.onload = e => save(e.target.result);
            reader.readAsDataURL(file);
        } else save(null);
    }
</script>
