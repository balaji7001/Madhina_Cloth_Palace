<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madhina Clothes</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- HERO CARD -->
    <section class="hero">

        <div class="hero-left">
            <p class="offer">Exclusive Offer 20% Off This Week</p>

            <h1>Stylish <br> Female Clothes</h1>

            <p class="desc">Made from Soft, Durable Cotton.</p>

            <div class="buttons">
                <button class="btn light">Select Category</button>
                <button class="btn dark">Shop Now</button>
            </div>

            <div class="customers">
                <img src="https://randomuser.me/api/portraits/women/1.jpg">
                <img src="https://randomuser.me/api/portraits/women/2.jpg">
                <img src="https://randomuser.me/api/portraits/women/3.jpg">
                <span>Our Happy Customers ⭐ 4.5</span>
            </div>
        </div>

        <div class="hero-right">
            <div class="circle"></div>
            <img
                src="https://hips.hearstapps.com/hmg-prod/images/screenshot-2024-06-25-at-12-37-19-667aac00ea8fb.png?crop=1xw:0.9919053549190535xh;center,top">
        </div>

    </section>
    <!-- PREMIUM SHADES -->
    <h2 class="section-title">Premium Shades</h2>

    <div class="shades">

        <div class="shade-card pink">
            <img src="https://images.unsplash.com/photo-1520975922284-9c7c6f1f0d61">
            <span>Women Gallery</span>
        </div>

        <div class="shade-card yellow">
            <img src="https://images.unsplash.com/photo-1544441893-675973e31985">
            <span>Children Fashion</span>
        </div>

        <div class="shade-card light">
            <img src="https://images.unsplash.com/photo-1521335629791-ce4aec67dd53">
            <span>Men's Fashion</span>
        </div>

        <div class="shade-card brown">
            <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
            <span>Women's Fashion</span>
        </div>

    </div>


    <!-- CATEGORY -->
    <h2 class="section-title">Category</h2>

    <div class="category-icons">

        <div class="cat active">👗<p>All</p>
        </div>
        <div class="cat">👗<p>Dresses</p>
        </div>
        <div class="cat">👕<p>T-shirts</p>
        </div>
        <div class="cat">👖<p>Denim</p>
        </div>
        <div class="cat">🧥<p>Jackets</p>
        </div>
        <div class="cat">🧣<p>Coats</p>
        </div>
        <div class="cat">👟<p>Shoes</p>
        </div>

    </div>

    <!-- CATEGORY -->
    <h2 class="title">Category</h2>

    <div class="products">

        <div class="card"><img src="https://images.unsplash.com/photo-1514996937319-344454492b37"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b"></div>
        <div class="card"><img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d"></div>

    </div>

</body>

</html>
