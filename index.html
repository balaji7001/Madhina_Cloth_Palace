<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madhina Cloth</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <img src="images/logo.jpeg">
        </div>

        <nav>
            <a class="active">Home</a>
            <a href="https://maps.app.goo.gl/cGk4r43jKUb2GvE18">Maps</a>
            <a href="admin.html">Admin</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-left">
            <h1>Madhina Cloth Palace 👑 </h1>
            <p class="sub">Made from Soft Durable Cotton</p>
        </div>

        <div class="hero-right">
            <img src="images/frontpage.png">
        </div>
    </section>

    <section class="category">
        <h2>Category</h2>

        <div class="filters">
            <button class="pill active">All</button>
            <button class="pill">dress</button>
            <button class="pill">shirt</button>
            <button class="pill">t-shirt</button>
            <button class="pill">shorts</button>
            <button class="pill">jeans</button>
            <button class="pill">leggings</button>
            <button class="pill">skirt</button>
            <button class="pill">saree</button>
            <button class="pill">men shirt</button>
            <button class="pill">men t-shirt</button>
            <button class="pill">men shorts</button>
            <button class="pill">men jeans</button>
            <button class="pill">men nightwear</button>
            <button class="pill">men innerwear</button>
            <button class="pill">kid dress</button>
            <button class="pill">kid shirt</button>
            <button class="pill">kid t-shirt</button>
            <button class="pill">kid shorts</button>
            <button class="pill">kid jeans</button>
            <button class="pill">kid leggings</button>
            <button class="pill">kid skirt</button>
            <button class="pill">kid shorts</button>
            <button class="pill">kid jeans</button>
            <button class="pill">kid leggings</button>
            <button class="pill">kid skirt</button>
        </div>

        <!-- SEARCH -->
        <input type="text" id="search" placeholder="Search products..." class="search">

        <!-- PRODUCTS -->
        <div class="products" id="products"></div>
    </section>

    <script src="script.js"></script>
</body>

</html>
